name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-pnpm-10:
    name: Build with pnpm 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10
          run_install: false


      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'

      - name: pnpm install
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build app
        run: pnpm --filter web build

  build-pnpm-11:
    name: Build with pnpm 11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Setup pnpm 11
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'

      - name: pnpm install
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build app
        run: pnpm --filter web build
